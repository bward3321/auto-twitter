name: Twitter Autoposter

on:
  schedule:
    # Keep as backup - GitHub cron (unreliable but free backup)
    - cron: '0 14 * * 0'   # Sunday 10am ET
    - cron: '0 12 * * *'   # Daily 8am ET
    - cron: '30 12 * * *'  # Daily 8:30am ET backup

  repository_dispatch:
    types: [post, generate]

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        type: choice
        options:
          - generate
          - post

permissions:
  contents: write

jobs:
  generate:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 14 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'generate') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'generate')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml gspread google-auth

      - name: Generate weekly posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
        run: python generate_all.py

  post:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule != '0 14 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'post') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'post')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml gspread google-auth oauth2client

      - name: Post approved content
        env:
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
        run: python post_all.py
