# ═══════════════════════════════════════════════════════════════════════════════
# SITES AUTOPOSTER CONFIG
# Each site gets its own X account, voice, topics, and posting schedule.
# Fully automated — no review needed.
# ═══════════════════════════════════════════════════════════════════════════════

defaults:
  posts_per_day: 5
  image_post_ratio: 0.4          # 40% of posts get Seedream images
  posting_window_start_hour: 9   # 9 AM ET
  posting_window_end_hour: 19    # 7 PM ET
  timezone: "America/New_York"

sites:

  # ─── EVERY FREE TOOL ──────────────────────────────────────────────────────
  - name: "EveryFreeTool"
    upload_post_profile: "@EveryFreeTool"
    website: "everyfreetool.com"
    
    voice:
      tone: "helpful, slightly nerdy, genuinely excited about free tools"
      style_notes: |
        Write like someone who spends their weekends finding obscure free tools 
        so other people don't have to. Enthusiastic but not salesy. 
        The goal is to be the account people follow because it saves them money.
        Mix tool recommendations with hot takes on the tools industry.
        Lowercase is fine. Keep it conversational.
      avoid: |
        - Sounding like an ad or affiliate marketer
        - "Check out this amazing tool!" energy
        - Hashtag spam
        - Emoji overload
        - Generic "productivity hack" vibes
      format_preferences: |
        - Short punchy tool recommendations with the URL
        - "Did you know [tool] can do [thing]?" format
        - Hot takes on paid vs free tools
        - "Stop paying for X when Y exists for free"
        - Occasional threads comparing tools

    categories:
      - name: "Free Tool Discoveries"
        description: "Highlighting specific free tools on everyfreetool.com"
        subtopics:
          - PDF tools (merge, split, compress, convert)
          - Image tools (resize, compress, convert, remove background)
          - Developer tools (JSON formatter, regex tester, base64 encoder)
          - Writing tools (grammar checker, word counter, text diff)
          - Finance tools (compound interest calculator, invoice generator)
          - Video & audio tools (video compressor, audio converter)
          - SEO tools (meta tag generator, sitemap validator)
          - Conversion tools (unit converter, color converter)
        angles:
          - "Stop paying $X/month for Y when this free tool does the same thing"
          - Direct links to specific tools on everyfreetool.com
          - Before/after comparisons (paid tool vs free alternative)
          - "I just found this free tool that..."

      - name: "Anti-SaaS Takes"
        description: "Hot takes on overpriced SaaS and why free alternatives win"
        subtopics:
          - SaaS pricing is out of control
          - Features that should be free
          - The free tier trap
          - Open source vs paid tools
          - Why simple tools beat bloated platforms
        angles:
          - Contrarian takes on popular paid tools
          - "You're paying $X/month for something that should cost $0"
          - Real cost breakdowns
          - Why the tools industry is broken

      - name: "Productivity & Workflows"
        description: "How to use free tools to build real workflows"
        subtopics:
          - Combining free tools for complete workflows
          - Free alternatives to expensive stacks
          - Tool recommendations by use case
          - "The free stack" for startups/freelancers
        angles:
          - Complete workflows using only free tools
          - "Here's what I use instead of paying for X"
          - Tool stacks for specific roles (designer, developer, marketer)

    # Links to include in posts — the system will rotate through these
    site_links:
      - url: "https://everyfreetool.com"
        context: "general site link"
      - url: "https://everyfreetool.com/pdf-tools"
        context: "when talking about PDF tools"
      - url: "https://everyfreetool.com/image-tools"
        context: "when talking about image tools"
      - url: "https://everyfreetool.com/developer-tools"
        context: "when talking about developer tools"
      - url: "https://everyfreetool.com/writing-tools"
        context: "when talking about writing tools"
      - url: "https://everyfreetool.com/finance-tools"
        context: "when talking about finance tools"
      - url: "https://everyfreetool.com/seo-tools"
        context: "when talking about SEO tools"
      - url: "https://everyfreetool.com/video-audio-tools"
        context: "when talking about video/audio tools"

  # ─── WHAT IFS (whatifs.fun) ────────────────────────────────────────────────
  - name: "WhatIfs"
    upload_post_profile: "@ifswhat91839"
    website: "whatifs.fun"
    
    voice:
      tone: "playful, curious, slightly chaotic, internet-native humor"
      style_notes: |
        Write like someone who makes weird browser games and loves it.
        The vibe is "what if we made a game about that?" 
        Playful, fun, sometimes absurd. Think neal.fun energy.
        Mix game promotions with gaming culture takes and "what if" questions.
        Use lowercase. Keep it light and fun.
      avoid: |
        - Being corporate or salesy
        - "Download our app" energy
        - Hashtag spam
        - Being too serious
        - Sounding like a game studio press release
      format_preferences: |
        - "what if you could [weird game concept]?" hooks
        - Short game descriptions with links
        - Screenshots/images of the games
        - Fun hypothetical questions
        - Gaming culture hot takes
        - "I just built a game where..." posts

    categories:
      - name: "Game Spotlights"
        description: "Promoting specific games on whatifs.fun"
        subtopics:
          - Browser games you can play right now
          - Quick 60-second games for breaks
          - Puzzle games and brain teasers
          - Simulation and sandbox games
          - Retro and arcade style games
          - Trivia and knowledge games
        angles:
          - Direct links to specific games on whatifs.fun
          - "bored at work? try this" energy
          - Challenge friends format
          - "I bet you can't beat my score" hooks
          - "just built this weird game where..."

      - name: "What If Questions"
        description: "Engaging hypothetical questions that tie into the brand"
        subtopics:
          - Absurd hypotheticals
          - Would you rather scenarios
          - "What if X was a game?" concepts
          - Fun thought experiments
        angles:
          - Pure engagement bait questions
          - Questions that make people reply
          - Tie hypotheticals back to actual games on the site
          - "we actually built a game about this"

      - name: "Internet & Gaming Culture"
        description: "Takes on gaming, internet culture, and browser games"
        subtopics:
          - Why browser games are making a comeback
          - Mobile games vs browser games
          - The neal.fun effect
          - Indie game development
          - Why simple games are addictive
          - Nostalgia for old flash games
        angles:
          - Hot takes on the gaming industry
          - Why AAA games are losing to simple browser games
          - The psychology of addictive simple games
          - "Remember when flash games were everything?"

    site_links:
      - url: "https://whatifs.fun"
        context: "general site link"
      - url: "https://whatifs.fun/games"
        context: "when talking about games in general"
